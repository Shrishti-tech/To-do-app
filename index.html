<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Task Manager</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .add-task-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        #taskInput {
            flex: 1;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
        }

        #taskInput:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #addBtn {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #addBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #addBtn:active {
            transform: translateY(0);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            display: block;
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            color: #333;
            font-size: 1.5em;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .task-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .task-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .task-text {
            font-size: 16px;
            color: #333;
            word-break: break-word;
        }

        .task-text.completed {
            text-decoration: line-through;
            color: #999;
        }

        .task-time {
            font-size: 12px;
            color: #999;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-complete {
            background: #28a745;
            color: white;
        }

        .btn-complete:hover {
            background: #218838;
            transform: scale(1.05);
        }

        .btn-edit {
            background: #ffc107;
            color: #333;
        }

        .btn-edit:hover {
            background: #e0a800;
            transform: scale(1.05);
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background: #c82333;
            transform: scale(1.05);
        }

        .btn-undo {
            background: #17a2b8;
            color: white;
        }

        .btn-undo:hover {
            background: #138496;
            transform: scale(1.05);
        }

        .empty-message {
            text-align: center;
            color: #999;
            font-style: italic;
            padding: 20px;
            display: none;
        }

        .empty-message.show {
            display: block;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .add-task-section {
                flex-direction: column;
            }

            .stats {
                flex-direction: column;
                gap: 15px;
            }

            .task-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .task-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 Daily Task Manager</h1>
            <p class="subtitle">Organize your day efficiently</p>
        </header>

        <div class="add-task-section">
            <input type="text" id="taskInput" placeholder="Enter your task here..." />
            <button id="addBtn" onclick="addTask()">Add Task</button>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-number" id="totalTasks">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="pendingTasks">0</span>
                <span class="stat-label">Pending</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="completedTasksCount">0</span>
                <span class="stat-label">Completed</span>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">⏳ Pending Tasks</h2>
            <ul id="pendingList" class="task-list"></ul>
            <p class="empty-message" id="pendingEmpty">
                No pending tasks. Add a new task to get started!
            </p>
        </div>

        <div class="section">
            <h2 class="section-title">✅ Completed Tasks</h2>
            <ul id="completedList" class="task-list"></ul>
            <p class="empty-message" id="completedEmpty">No completed tasks yet.</p>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        document.addEventListener('DOMContentLoaded', function () {
            renderTasks();
            updateStats();
        });

        function addTask() {
            const taskInput = document.getElementById('taskInput');
            const taskText = taskInput.value.trim();

            if (taskText === '') {
                alert('Please enter a task!');
                return;
            }

            const task = {
                id: Date.now(),
                text: taskText,
                completed: false,
                createdAt: new Date().toLocaleString(),
                completedAt: null,
            };

            tasks.push(task);
            saveTasks();
            renderTasks();
            updateStats();
            taskInput.value = '';
            taskInput.focus();
        }

        document
            .getElementById('taskInput')
            .addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    addTask();
                }
            });

        function completeTask(id) {
            const task = tasks.find((t) => t.id === id);
            if (task) {
                task.completed = true;
                task.completedAt = new Date().toLocaleString();
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        function undoComplete(id) {
            const task = tasks.find((t) => t.id === id);
            if (task) {
                task.completed = false;
                task.completedAt = null;
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        function editTask(id) {
            const task = tasks.find((t) => t.id === id);
            if (task) {
                const newText = prompt('Edit your task:', task.text);
                if (newText !== null && newText.trim() !== '') {
                    task.text = newText.trim();
                    saveTasks();
                    renderTasks();
                }
            }
        }

        function deleteTask(id) {
            if (confirm('Are you sure you want to delete this task?')) {
                tasks = tasks.filter((t) => t.id !== id);
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        function renderTasks() {
            const pendingList = document.getElementById('pendingList');
            const completedList = document.getElementById('completedList');
            const pendingEmpty = document.getElementById('pendingEmpty');
            const completedEmpty = document.getElementById('completedEmpty');

            pendingList.innerHTML = '';
            completedList.innerHTML = '';

            const pendingTasks = tasks.filter((t) => !t.completed);
            const completedTasks = tasks.filter((t) => t.completed);

            if (pendingTasks.length === 0) {
                pendingEmpty.classList.add('show');
            } else {
                pendingEmpty.classList.remove('show');
                pendingTasks.forEach((task) => {
                    pendingList.appendChild(createTaskElement(task, false));
                });
            }

            if (completedTasks.length === 0) {
                completedEmpty.classList.add('show');
            } else {
                completedEmpty.classList.remove('show');
                completedTasks.forEach((task) => {
                    completedList.appendChild(createTaskElement(task, true));
                });
            }
        }

        function createTaskElement(task, isCompleted) {
            const li = document.createElement('li');
            li.className = 'task-item';

            const taskContent = document.createElement('div');
            taskContent.className = 'task-content';

            const taskText = document.createElement('div');
            taskText.className = 'task-text' + (isCompleted ? ' completed' : '');
            taskText.textContent = task.text;

            const taskTime = document.createElement('div');
            taskTime.className = 'task-time';
            taskTime.textContent = isCompleted
                ? `Created: ${task.createdAt} | Completed: ${task.completedAt}`
                : `Created: ${task.createdAt}`;

            taskContent.appendChild(taskText);
            taskContent.appendChild(taskTime);

            const taskActions = document.createElement('div');
            taskActions.className = 'task-actions';

            if (!isCompleted) {
                const completeBtn = document.createElement('button');
                completeBtn.className = 'btn btn-complete';
                completeBtn.textContent = '✓ Complete';
                completeBtn.onclick = () => completeTask(task.id);

                const editBtn = document.createElement('button');
                editBtn.className = 'btn btn-edit';
                editBtn.textContent = '✎ Edit';
                editBtn.onclick = () => editTask(task.id);

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'btn btn-delete';
                deleteBtn.textContent = '✕ Delete';
                deleteBtn.onclick = () => deleteTask(task.id);

                taskActions.appendChild(completeBtn);
                taskActions.appendChild(editBtn);
                taskActions.appendChild(deleteBtn);
            } else {
                const undoBtn = document.createElement('button');
                undoBtn.className = 'btn btn-undo';
                undoBtn.textContent = '↶ Undo';
                undoBtn.onclick = () => undoComplete(task.id);

                const editBtn = document.createElement('button');
                editBtn.className = 'btn btn-edit';
                editBtn.textContent = '✎ Edit';
                editBtn.onclick = () => editTask(task.id);

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'btn btn-delete';
                deleteBtn.textContent = '✕ Delete';
                deleteBtn.onclick = () => deleteTask(task.id);

                taskActions.appendChild(undoBtn);
                taskActions.appendChild(editBtn);
                taskActions.appendChild(deleteBtn);
            }

            li.appendChild(taskContent);
            li.appendChild(taskActions);

            return li;
        }

        function updateStats() {
            const totalTasks = tasks.length;
            const pendingTasks = tasks.filter((t) => !t.completed).length;
            const completedTasks = tasks.filter((t) => t.completed).length;

            document.getElementById('totalTasks').textContent = totalTasks;
            document.getElementById('pendingTasks').textContent = pendingTasks;
            document.getElementById('completedTasksCount').textContent =
                completedTasks;
        }

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }
    </script>
</body>
</html>
